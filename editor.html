<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IMA Premium Image Styler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0a; color: #f4f4f3; }
        .font-luxury { font-family: 'Cormorant Garamond', serif; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #c5a880; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-8">
    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 my-auto">
        <section class="lg:col-span-5 bg-neutral-950 border border-neutral-900 p-6 flex flex-col justify-between space-y-6 rounded-lg">
            <div>
                <h2 class="font-luxury text-2xl text-white mb-4">Бежевый Тонировщик Арка</h2>
                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-wider text-[#c5a880] mb-2 font-semibold">1. Загрузи фото</label>
                    <input type="file" id="imageLoader" accept="image/*" class="w-full text-xs text-neutral-400 bg-neutral-900 p-2 rounded border border-neutral-800">
                </div>
                <div class="space-y-4">
                    <label class="block text-xs uppercase tracking-wider text-[#c5a880] font-semibold">2. Настройки</label>
                    <div><div class="flex justify-between text-xs text-neutral-400 mb-1"><span>Масштаб</span><span id="zoomVal">100%</span></div><input type="range" id="zoomRange" min="50" max="300" value="100" class="w-full accent-[#c5a880]"></div>
                    <div><div class="flex justify-between text-xs text-neutral-400 mb-1"><span>Сдвиг X</span><span id="xVal">0px</span></div><input type="range" id="xRange" min="-300" max="300" value="0" class="w-full accent-[#c5a880]"></div>
                    <div><div class="flex justify-between text-xs text-neutral-400 mb-1"><span>Сдвиг Y</span><span id="yVal">0px</span></div><input type="range" id="yRange" min="-300" max="300" value="0" class="w-full accent-[#c5a880]"></div>
                    <div><div class="flex justify-between text-xs text-white font-medium mb-1"><span>Интенсивность бежевого мата</span><span id="beigeVal">75%</span></div><input type="range" id="beigeRange" min="0" max="100" value="75" class="w-full accent-[#c5a880]"></div>
                </div>
                <div class="mt-4">
                    <label class="block text-xs uppercase tracking-wider text-[#c5a880] mb-2 font-semibold">3. Текст</label>
                    <input type="text" id="textOverlay" placeholder="NEW YORK" class="w-full bg-neutral-900 border border-neutral-800 px-3 py-2 text-sm text-white rounded focus:outline-none">
                </div>
            </div>
            <button id="downloadBtn" class="w-full bg-[#c5a880] hover:bg-[#b3956d] text-black font-semibold uppercase tracking-wider py-4 text-sm transition-colors rounded">Скачать арку (.jpg)</button>
        </section>
        <section class="lg:col-span-7 flex flex-col items-center justify-center bg-neutral-950 border border-neutral-900 p-8 rounded-lg">
            <div class="w-full max-w-sm bg-[#fdfbf7] p-6 flex flex-col justify-between shadow-2xl rounded border border-neutral-200">
                <div class="overflow-hidden rounded-t-full h-72 w-full bg-neutral-100 flex items-center justify-center relative">
                    <canvas id="canvas" class="hidden"></canvas>
                    <div id="previewContainer" class="w-full h-full flex items-center justify-center text-neutral-400 text-xs p-4 text-center">Загрузи фото слева</div>
                </div>
                <h3 class="font-luxury text-2xl text-neutral-800 my-2" id="cardTitle">США</h3>
            </div>
        </section>
    </main>
    <script>
        const imageLoader = document.getElementById('imageLoader'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), previewContainer = document.getElementById('previewContainer');
        const zoomRange = document.getElementById('zoomRange'), xRange = document.getElementById('xRange'), yRange = document.getElementById('yRange'), beigeRange = document.getElementById('beigeRange'), textOverlayInput = document.getElementById('textOverlay'), downloadBtn = document.getElementById('downloadBtn');
        let activeImage = null; const targetWidth = 600, targetHeight = 800; canvas.width = targetWidth; canvas.height = targetHeight;
        imageLoader.addEventListener('change', e => {
            const reader = new FileReader(); reader.onload = ev => { const img = new Image(); img.onload = () => { activeImage = img; renderCanvas(); }; img.src = ev.target.result; }; reader.readAsDataURL(e.target.files[0]);
        });
        function renderCanvas() {
            if (!activeImage) return; ctx.clearRect(0, 0, targetWidth, targetHeight); ctx.save();
            ctx.beginPath(); const radius = targetWidth / 2; ctx.moveTo(0, targetHeight); ctx.lineTo(0, radius); ctx.arc(radius, radius, radius, Math.PI, 0, false); ctx.lineTo(targetWidth, targetHeight); ctx.closePath(); ctx.clip();
            const scale = zoomRange.value / 100, offsetX = parseInt(xRange.value), offsetY = parseInt(yRange.value);
            let drawWidth = targetWidth, drawHeight = targetHeight; if ((activeImage.width / activeImage.height) > (targetWidth / targetHeight)) { drawWidth = targetHeight * (activeImage.width / activeImage.height); } else { drawHeight = targetWidth / (activeImage.width / activeImage.height); }
            drawWidth *= scale; drawHeight *= scale; ctx.drawImage(activeImage, (targetWidth - drawWidth) / 2 + offsetX, (targetHeight - drawHeight) / 2 + offsetY, drawWidth, drawHeight);
            const bFactor = beigeRange.value / 100;
            if (bFactor > 0) {
                let imgData = ctx.getImageData(0, 0, targetWidth, targetHeight), d = imgData.data;
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i+3] === 0) continue; let gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2], ratio = gray / 255;
                    d[i] = d[i] * (1 - bFactor) + (65 + 175 * ratio) * bFactor; d[i+1] = d[i+1] * (1 - bFactor) + (55 + 175 * ratio) * bFactor; d[i+2] = d[i+2] * (1 - bFactor) + (48 + 167 * ratio) * bFactor;
                }
                ctx.putImageData(imgData, 0, 0);
            }
            ctx.restore();
            if (textOverlayInput.value) { ctx.save(); ctx.font = "italic 32px 'Cormorant Garamond'"; ctx.fillStyle = "rgba(255, 255, 255, 0.85)"; ctx.textAlign = "center"; ctx.fillText(textOverlayInput.value.toUpperCase(), targetWidth / 2, targetHeight - 45); ctx.restore(); }
            previewContainer.innerHTML = `<img src="${canvas.toDataURL('image/jpeg', 0.9)}" class="w-full h-full object-cover rounded-t-full">`;
        }
        [zoomRange, xRange, yRange, beigeRange, textOverlayInput].forEach(c => c.addEventListener('input', () => {
            document.getElementById('zoomVal').textContent = zoomRange.value + '%'; document.getElementById('xVal').textContent = xRange.value + 'px'; document.getElementById('yVal').textContent = yRange.value + 'px'; document.getElementById('beigeVal').textContent = beigeRange.value + '%';
            renderCanvas();
        }));
        downloadBtn.addEventListener('click', () => { if (!activeImage) return alert('Загрузи фото!'); const link = document.createElement('a'); link.download = 'usa.jpg'; link.href = canvas.toDataURL('image/jpeg', 0.95); link.click(); });
    </script>
</body>
</html>
